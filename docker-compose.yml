services:
  mysql:
    image: ${DOCKER_REGISTRY}${MYSQL_IMAGE}
    container_name: ${PROJECT_NAME}-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:${MYSQL_PORT}:${MYSQL_INTERNAL_PORT}"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/sql:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - fitness-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: ${DOCKER_REGISTRY}${REDIS_IMAGE}
    container_name: ${PROJECT_NAME}-redis
    ports:
      - "127.0.0.1:${REDIS_PORT}:${REDIS_INTERNAL_PORT}"
    volumes:
      - redis-data:/data
    networks:
      - fitness-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY}
        MAVEN_IMAGE: ${MAVEN_IMAGE}
        JRE_IMAGE: ${JRE_IMAGE}
    container_name: ${PROJECT_NAME}-backend
    ports:
      - "127.0.0.1:${BACKEND_PORT}:${BACKEND_INTERNAL_PORT}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:${MYSQL_INTERNAL_PORT}/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: ${REDIS_INTERNAL_PORT}
      SERVER_PORT: ${BACKEND_INTERNAL_PORT}
    networks:
      - fitness-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        DOCKER_REGISTRY: ${DOCKER_REGISTRY}
        NODE_IMAGE: ${NODE_IMAGE}
        NGINX_IMAGE: ${NGINX_IMAGE}
    container_name: ${PROJECT_NAME}-frontend
    ports:
      - "127.0.0.1:${FRONTEND_PORT}:${NGINX_INTERNAL_PORT}"
    depends_on:
      - backend
    networks:
      - fitness-network
    restart: unless-stopped

volumes:
  mysql-data:
    name: ${PROJECT_NAME}-mysql-data
  redis-data:
    name: ${PROJECT_NAME}-redis-data

networks:
  fitness-network:
    name: ${PROJECT_NAME}-network
    driver: bridge
